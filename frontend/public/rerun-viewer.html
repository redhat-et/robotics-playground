<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Rerun Viewer</title>
    <style>
      html, body, #viewer { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; background: #1c1c1c; }
    </style>
  </head>
  <body>
    <div id="viewer"></div>
    <script type="module">
      import { WebViewer } from "./re_viewer.js";

      const params = new URLSearchParams(window.location.search);
      const url = params.get("url");
      const hideWelcome = params.has("hide_welcome_screen");

      const viewer = new WebViewer();
      await viewer.start(url, document.getElementById("viewer"), {
        width: "100%",
        height: "100%",
        hide_welcome_screen: hideWelcome,
      });
    </script>
  </body>
</html>
