name: Container Images

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
    tags: ['v*']

env:
  REGISTRY: quay.io
  IMAGE_UI: quay.io/redhat-et/robotics-playground-ui
  IMAGE_BACKEND: quay.io/redhat-et/robotics-playground
  SHORT_SHA: placeholder

jobs:
  build-ui:
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: amd64
            runner: ubuntu-latest
          - arch: arm64
            runner: ubuntu-24.04-arm
    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@v7

      - name: Set short SHA
        run: echo "SHORT_SHA=${GITHUB_SHA::8}" >> "$GITHUB_ENV"

      - name: Build frontend image
        run: |
          podman build \
            -t ${IMAGE_UI}:${{ matrix.arch }}-${SHORT_SHA} \
            -f frontend/Containerfile frontend/

      - name: Login to Quay.io
        if: github.event_name == 'push'
        run: podman login -u ${{ secrets.QUAY_USERNAME }} -p ${{ secrets.QUAY_PASSWORD }} quay.io

      - name: Push per-arch images
        if: github.event_name == 'push'
        run: podman push ${IMAGE_UI}:${{ matrix.arch }}-${SHORT_SHA}

      - name: Tag and push release images
        if: startsWith(github.ref, 'refs/tags/v')
        run: |
          TAG=${GITHUB_REF#refs/tags/}
          podman tag ${IMAGE_UI}:${{ matrix.arch }}-${SHORT_SHA} ${IMAGE_UI}:${{ matrix.arch }}-${TAG}
          podman push ${IMAGE_UI}:${{ matrix.arch }}-${TAG}

  build-backend:
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: amd64
            runner: ubuntu-latest
          - arch: arm64
            runner: ubuntu-24.04-arm
    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@v7

      - name: Set short SHA
        run: echo "SHORT_SHA=${GITHUB_SHA::8}" >> "$GITHUB_ENV"

      - name: Build backend image
        run: |
          podman build \
            -t ${IMAGE_BACKEND}:${{ matrix.arch }}-${SHORT_SHA} \
            -f backend/Containerfile backend/

      - name: Login to Quay.io
        if: github.event_name == 'push'
        run: podman login -u ${{ secrets.QUAY_USERNAME }} -p ${{ secrets.QUAY_PASSWORD }} quay.io

      - name: Push per-arch images
        if: github.event_name == 'push'
        run: podman push ${IMAGE_BACKEND}:${{ matrix.arch }}-${SHORT_SHA}

      - name: Tag and push release images
        if: startsWith(github.ref, 'refs/tags/v')
        run: |
          TAG=${GITHUB_REF#refs/tags/}
          podman tag ${IMAGE_BACKEND}:${{ matrix.arch }}-${SHORT_SHA} ${IMAGE_BACKEND}:${{ matrix.arch }}-${TAG}
          podman push ${IMAGE_BACKEND}:${{ matrix.arch }}-${TAG}

  manifest:
    needs: [build-ui, build-backend]
    if: >-
      always() &&
      github.event_name == 'push' &&
      !contains(needs.*.result, 'cancelled')
    runs-on: ubuntu-latest
    steps:
      - name: Set short SHA
        run: echo "SHORT_SHA=${GITHUB_SHA::8}" >> "$GITHUB_ENV"

      - name: Login to Quay.io
        run: podman login -u ${{ secrets.QUAY_USERNAME }} -p ${{ secrets.QUAY_PASSWORD }} quay.io

      - name: Create and push manifest lists (commit sha)
        run: |
          add_arch_images() {
            local manifest=$1 image=$2 tag=$3
            # amd64 is required
            podman manifest add "${manifest}" "${image}:amd64-${tag}"
            # arm64 is optional
            if podman manifest inspect "${image}:arm64-${tag}" > /dev/null 2>&1; then
              podman manifest add "${manifest}" "${image}:arm64-${tag}"
            else
              echo "::warning::${image}:arm64-${tag} not found, skipping"
            fi
          }

          for image in ${IMAGE_UI} ${IMAGE_BACKEND}; do
            podman manifest create ${image}:${SHORT_SHA}
            add_arch_images "${image}:${SHORT_SHA}" "${image}" "${SHORT_SHA}"
            podman manifest push ${image}:${SHORT_SHA} docker://${image}:${SHORT_SHA}
          done

      - name: Create and push manifest lists (latest)
        if: github.ref == 'refs/heads/main'
        run: |
          add_arch_images() {
            local manifest=$1 image=$2 tag=$3
            podman manifest add "${manifest}" "${image}:amd64-${tag}"
            if podman manifest inspect "${image}:arm64-${tag}" > /dev/null 2>&1; then
              podman manifest add "${manifest}" "${image}:arm64-${tag}"
            else
              echo "::warning::${image}:arm64-${tag} not found, skipping"
            fi
          }

          for image in ${IMAGE_UI} ${IMAGE_BACKEND}; do
            podman manifest create ${image}:latest
            add_arch_images "${image}:latest" "${image}" "${SHORT_SHA}"
            podman manifest push ${image}:latest docker://${image}:latest
          done

      - name: Create and push manifest lists (release tag)
        if: startsWith(github.ref, 'refs/tags/v')
        run: |
          TAG=${GITHUB_REF#refs/tags/}

          add_arch_images() {
            local manifest=$1 image=$2 tag=$3
            podman manifest add "${manifest}" "${image}:amd64-${tag}"
            if podman manifest inspect "${image}:arm64-${tag}" > /dev/null 2>&1; then
              podman manifest add "${manifest}" "${image}:arm64-${tag}"
            else
              echo "::warning::${image}:arm64-${tag} not found, skipping"
            fi
          }

          for image in ${IMAGE_UI} ${IMAGE_BACKEND}; do
            podman manifest create ${image}:${TAG}
            add_arch_images "${image}:${TAG}" "${image}" "${SHORT_SHA}"
            podman manifest push ${image}:${TAG} docker://${image}:${TAG}
          done
