name: Container Images

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
    tags: ['v*']

env:
  REGISTRY: quay.io
  IMAGE_UI: quay.io/redhat-et/robotics-playground-ui
  IMAGE_BACKEND: quay.io/redhat-et/robotics-playground
  SHORT_SHA: placeholder

jobs:
  build:
    strategy:
      matrix:
        include:
          - arch: amd64
            runner: ubuntu-latest
          - arch: arm64
            runner: ubuntu-24.04-arm
    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@v7

      - name: Set short SHA
        run: echo "SHORT_SHA=${GITHUB_SHA::8}" >> "$GITHUB_ENV"

      - name: Build frontend image
        run: |
          podman build \
            -t ${IMAGE_UI}:${{ matrix.arch }}-${SHORT_SHA} \
            -f frontend/Containerfile frontend/

      - name: Build backend image
        run: |
          podman build \
            -t ${IMAGE_BACKEND}:${{ matrix.arch }}-${SHORT_SHA} \
            -f backend/Containerfile backend/

      - name: Login to Quay.io
        if: github.event_name == 'push'
        run: podman login -u ${{ secrets.QUAY_USERNAME }} -p ${{ secrets.QUAY_PASSWORD }} quay.io

      - name: Push per-arch images
        if: github.event_name == 'push'
        run: |
          podman push ${IMAGE_UI}:${{ matrix.arch }}-${SHORT_SHA}
          podman push ${IMAGE_BACKEND}:${{ matrix.arch }}-${SHORT_SHA}

      - name: Tag and push release images
        if: startsWith(github.ref, 'refs/tags/v')
        run: |
          TAG=${GITHUB_REF#refs/tags/}
          for img in ${IMAGE_UI} ${IMAGE_BACKEND}; do
            podman tag ${img}:${{ matrix.arch }}-${SHORT_SHA} ${img}:${{ matrix.arch }}-${TAG}
            podman push ${img}:${{ matrix.arch }}-${TAG}
          done

  manifest:
    needs: build
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    steps:
      - name: Set short SHA
        run: echo "SHORT_SHA=${GITHUB_SHA::8}" >> "$GITHUB_ENV"

      - name: Login to Quay.io
        run: podman login -u ${{ secrets.QUAY_USERNAME }} -p ${{ secrets.QUAY_PASSWORD }} quay.io

      - name: Create and push manifest lists (commit sha)
        run: |
          for img in ${IMAGE_UI} ${IMAGE_BACKEND}; do
            podman manifest create ${img}:${SHORT_SHA}
            podman manifest add ${img}:${SHORT_SHA} ${img}:amd64-${SHORT_SHA}
            podman manifest add ${img}:${SHORT_SHA} ${img}:arm64-${SHORT_SHA}
            podman manifest push ${img}:${SHORT_SHA} docker://${img}:${SHORT_SHA}
          done

      - name: Create and push manifest lists (latest)
        if: github.ref == 'refs/heads/main'
        run: |
          for img in ${IMAGE_UI} ${IMAGE_BACKEND}; do
            podman manifest create ${img}:latest
            podman manifest add ${img}:latest ${img}:amd64-${SHORT_SHA}
            podman manifest add ${img}:latest ${img}:arm64-${SHORT_SHA}
            podman manifest push ${img}:latest docker://${img}:latest
          done

      - name: Create and push manifest lists (release tag)
        if: startsWith(github.ref, 'refs/tags/v')
        run: |
          TAG=${GITHUB_REF#refs/tags/}
          for img in ${IMAGE_UI} ${IMAGE_BACKEND}; do
            podman manifest create ${img}:${TAG}
            podman manifest add ${img}:${TAG} ${img}:amd64-${SHORT_SHA}
            podman manifest add ${img}:${TAG} ${img}:arm64-${SHORT_SHA}
            podman manifest push ${img}:${TAG} docker://${img}:${TAG}
          done
