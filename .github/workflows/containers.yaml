name: Container Images

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
    tags: ['v*']

env:
  REGISTRY: quay.io
  IMAGE_UI: quay.io/redhat-et/robotics-playground-ui
  IMAGE_BACKEND: quay.io/redhat-et/robotics-playground
  SHORT_SHA: placeholder

jobs:
  build-ui:
    strategy:
      matrix:
        include:
          - arch: amd64
            runner: ubuntu-latest
          - arch: arm64
            runner: ubuntu-24.04-arm
    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@v7

      - name: Set short SHA
        run: echo "SHORT_SHA=${GITHUB_SHA::8}" >> "$GITHUB_ENV"

      - name: Login to Quay.io
        run: podman login -u ${{ secrets.QUAY_USERNAME }} -p ${{ secrets.QUAY_PASSWORD }} quay.io

      - name: Pull cache source
        run: podman pull --platform linux/${{ matrix.arch }} ${IMAGE_UI}:latest || true

      - name: Build frontend image
        run: |
          podman build \
            --layers \
            --cache-from ${IMAGE_UI}:latest \
            -t ${IMAGE_UI}:${{ matrix.arch }}-${SHORT_SHA} \
            -f frontend/Containerfile frontend/

      - name: Push per-arch images
        if: github.event_name == 'push'
        run: podman push ${IMAGE_UI}:${{ matrix.arch }}-${SHORT_SHA}

      - name: Tag and push release images
        if: startsWith(github.ref, 'refs/tags/v')
        run: |
          TAG=${GITHUB_REF#refs/tags/}
          podman tag ${IMAGE_UI}:${{ matrix.arch }}-${SHORT_SHA} ${IMAGE_UI}:${{ matrix.arch }}-${TAG}
          podman push ${IMAGE_UI}:${{ matrix.arch }}-${TAG}

  build-backend:
    strategy:
      matrix:
        include:
          - arch: amd64
            runner: ubuntu-latest
          - arch: arm64
            runner: ubuntu-24.04-arm
    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@v7

      - name: Set short SHA
        run: echo "SHORT_SHA=${GITHUB_SHA::8}" >> "$GITHUB_ENV"

      - name: Login to Quay.io
        run: podman login -u ${{ secrets.QUAY_USERNAME }} -p ${{ secrets.QUAY_PASSWORD }} quay.io

      - name: Pull cache source
        run: podman pull --platform linux/${{ matrix.arch }} ${IMAGE_BACKEND}:latest || true

      - name: Build backend image
        run: |
          podman build \
            --layers \
            --cache-from ${IMAGE_BACKEND}:latest \
            -t ${IMAGE_BACKEND}:${{ matrix.arch }}-${SHORT_SHA} \
            -f backend/Containerfile backend/

      - name: Push per-arch images
        if: github.event_name == 'push'
        run: podman push ${IMAGE_BACKEND}:${{ matrix.arch }}-${SHORT_SHA}

      - name: Tag and push release images
        if: startsWith(github.ref, 'refs/tags/v')
        run: |
          TAG=${GITHUB_REF#refs/tags/}
          podman tag ${IMAGE_BACKEND}:${{ matrix.arch }}-${SHORT_SHA} ${IMAGE_BACKEND}:${{ matrix.arch }}-${TAG}
          podman push ${IMAGE_BACKEND}:${{ matrix.arch }}-${TAG}

  manifest:
    needs: [build-ui, build-backend]
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    steps:
      - name: Set short SHA
        run: echo "SHORT_SHA=${GITHUB_SHA::8}" >> "$GITHUB_ENV"

      - name: Login to Quay.io
        run: podman login -u ${{ secrets.QUAY_USERNAME }} -p ${{ secrets.QUAY_PASSWORD }} quay.io

      - name: Create and push UI manifest lists (commit sha)
        run: |
          podman manifest create ${IMAGE_UI}:${SHORT_SHA}
          podman manifest add ${IMAGE_UI}:${SHORT_SHA} ${IMAGE_UI}:amd64-${SHORT_SHA}
          podman manifest add ${IMAGE_UI}:${SHORT_SHA} ${IMAGE_UI}:arm64-${SHORT_SHA}
          podman manifest push ${IMAGE_UI}:${SHORT_SHA} docker://${IMAGE_UI}:${SHORT_SHA}

      - name: Create and push backend manifest lists (commit sha)
        run: |
          podman manifest create ${IMAGE_BACKEND}:${SHORT_SHA}
          podman manifest add ${IMAGE_BACKEND}:${SHORT_SHA} ${IMAGE_BACKEND}:amd64-${SHORT_SHA}
          podman manifest add ${IMAGE_BACKEND}:${SHORT_SHA} ${IMAGE_BACKEND}:arm64-${SHORT_SHA}
          podman manifest push ${IMAGE_BACKEND}:${SHORT_SHA} docker://${IMAGE_BACKEND}:${SHORT_SHA}

      - name: Create and push manifest lists (latest)
        if: github.ref == 'refs/heads/main'
        run: |
          podman manifest create ${IMAGE_UI}:latest
          podman manifest add ${IMAGE_UI}:latest ${IMAGE_UI}:amd64-${SHORT_SHA}
          podman manifest add ${IMAGE_UI}:latest ${IMAGE_UI}:arm64-${SHORT_SHA}
          podman manifest push ${IMAGE_UI}:latest docker://${IMAGE_UI}:latest

          podman manifest create ${IMAGE_BACKEND}:latest
          podman manifest add ${IMAGE_BACKEND}:latest ${IMAGE_BACKEND}:amd64-${SHORT_SHA}
          podman manifest add ${IMAGE_BACKEND}:latest ${IMAGE_BACKEND}:arm64-${SHORT_SHA}
          podman manifest push ${IMAGE_BACKEND}:latest docker://${IMAGE_BACKEND}:latest

      - name: Create and push manifest lists (release tag)
        if: startsWith(github.ref, 'refs/tags/v')
        run: |
          TAG=${GITHUB_REF#refs/tags/}
          podman manifest create ${IMAGE_UI}:${TAG}
          podman manifest add ${IMAGE_UI}:${TAG} ${IMAGE_UI}:amd64-${SHORT_SHA}
          podman manifest add ${IMAGE_UI}:${TAG} ${IMAGE_UI}:arm64-${SHORT_SHA}
          podman manifest push ${IMAGE_UI}:${TAG} docker://${IMAGE_UI}:${TAG}

          podman manifest create ${IMAGE_BACKEND}:${TAG}
          podman manifest add ${IMAGE_BACKEND}:${TAG} ${IMAGE_BACKEND}:amd64-${SHORT_SHA}
          podman manifest add ${IMAGE_BACKEND}:${TAG} ${IMAGE_BACKEND}:arm64-${SHORT_SHA}
          podman manifest push ${IMAGE_BACKEND}:${TAG} docker://${IMAGE_BACKEND}:${TAG}
