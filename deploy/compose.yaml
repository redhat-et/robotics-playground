services:
  ui:
    image: robotics-playground-ui:${TAG:-local}
    ports:
      - "8080:8080"
    depends_on:
      backend:
        condition: service_started

  backend:
    image: robotics-playground:${TAG:-local}
    ports:
      - "8000:8000"
      - "9876:9876"
      - "9090:9090"
    volumes:
      - ./config/playground.yaml:/etc/robotics-playground/config.yaml:ro
    environment:
      PLAYGROUND_CONFIG: /etc/robotics-playground/config.yaml

  isaac-lab:
    image: nvcr.io/nvidia/isaac-lab:2.3.2
    profiles:
      - gpu
    network_mode: host
    ipc: host
    security_opt:
      - label=disable
    entrypoint: ""
    environment:
      LD_LIBRARY_PATH: /isaac-sim/exts/isaacsim.ros2.bridge/jazzy/lib
    volumes:
      - ./isaac-sim/launch_ros2_scene.py:/app/launch_ros2_scene.py:ro
    command: >-
      bash -c './isaaclab.sh -p /app/launch_ros2_scene.py --headless --enable_cameras'
    deploy:
      resources:
        reservations:
          devices:
            - capabilities: [gpu]
