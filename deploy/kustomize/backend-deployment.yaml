apiVersion: apps/v1
kind: Deployment
metadata:
  name: robotics-playground-backend
  labels:
    app.kubernetes.io/name: robotics-playground-backend
    app.kubernetes.io/component: backend
    app.kubernetes.io/part-of: robotics-playground
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: robotics-playground-backend
  template:
    metadata:
      labels:
        app.kubernetes.io/name: robotics-playground-backend
        app.kubernetes.io/component: backend
        app.kubernetes.io/part-of: robotics-playground
    spec:
      containers:
        - name: api
          image: quay.io/redhat-et/robotics-playground:latest
          ports:
            - name: http
              containerPort: 8000
              protocol: TCP
            - name: rerun-web
              containerPort: 9090
              protocol: TCP
            - name: rerun-grpc
              containerPort: 9876
              protocol: TCP
          env:
            - name: PLAYGROUND_CONFIG
              value: /etc/robotics-playground/config.yaml
            - name: ROS_DISCOVERY_SERVER
              value: fastdds-discovery:11811
          volumeMounts:
            - name: config
              mountPath: /etc/robotics-playground
              readOnly: true
          readinessProbe:
            httpGet:
              path: /api/health
              port: http
            initialDelaySeconds: 3
            periodSeconds: 10
          resources:
            requests:
              cpu: 50m
              memory: 128Mi
            limits:
              memory: 512Mi
      volumes:
        - name: config
          configMap:
            name: robotics-playground-config
