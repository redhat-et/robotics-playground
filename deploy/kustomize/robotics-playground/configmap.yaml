apiVersion: v1
kind: ConfigMap
metadata:
  name: robotics-playground-config
  labels:
    app.kubernetes.io/name: robotics-playground
    app.kubernetes.io/part-of: robotics-playground
data:
  config.yaml: |
    server:
      host: "0.0.0.0"
      port: 8000
      log_level: "info"

    rerun:
      grpc_port: 9876

    bridge:
      type: "mock"

    policy:
      type: "mock"
      default_model: "dreamzero-v1"
      models:
        dreamzero-v1:
          name: "DreamZero"
          endpoint: "ws://dreamzero-predictor/v1/realtime/robot/openpi"
          action_horizon: 4
        pi05-v1:
          name: "pi0.5"
          endpoint: "ws://pi05-predictor/"
          action_horizon: 8
          action_type: "velocity"
          camera_mapping:
            wrist: "observation/wrist_image_left"
            exterior_1: "observation/exterior_image_1_left"
      embodiment:
        joint_names:
          - panda_joint1
          - panda_joint2
          - panda_joint3
          - panda_joint4
          - panda_joint5
          - panda_joint6
          - panda_joint7
        training_order:
          - panda_joint1
          - panda_joint2
          - panda_joint3
          - panda_joint4
          - panda_joint5
          - panda_joint6
          - panda_joint7
        joint_limits:
          panda_joint1: [-2.8973, 2.8973]
          panda_joint2: [-1.7628, 1.7628]
          panda_joint3: [-2.8973, 2.8973]
          panda_joint4: [-3.0718, -0.0698]
          panda_joint5: [-2.8973, 2.8973]
          panda_joint6: [-0.0175, 3.7525]
          panda_joint7: [-2.8973, 2.8973]
        gripper_joint: "panda_finger_joint1"
        gripper_limits: [0.0, 0.04]
        camera_mapping:
          wrist: "observation/wrist_image_left"
          exterior_1: "observation/exterior_image_1_left"
          exterior_2: "observation/exterior_image_2_left"
