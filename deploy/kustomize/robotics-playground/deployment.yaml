apiVersion: apps/v1
kind: Deployment
metadata:
  name: robotics-playground
  labels:
    app.kubernetes.io/name: robotics-playground
    app.kubernetes.io/component: backend
    app.kubernetes.io/part-of: robotics-playground
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: robotics-playground
  template:
    metadata:
      labels:
        app.kubernetes.io/name: robotics-playground
        app.kubernetes.io/component: backend
        app.kubernetes.io/part-of: robotics-playground
    spec:
      containers:
        - name: api
          image: quay.io/redhat-et/robotics-playground:latest
          ports:
            - name: http
              containerPort: 8000
              protocol: TCP
            - name: rerun-grpc
              containerPort: 9876
              protocol: TCP
          env:
            - name: PLAYGROUND_CONFIG
              value: /etc/robotics-playground/config.yaml
            - name: ROS_LOCALHOST_ONLY
              value: "1"
          volumeMounts:
            - name: config
              mountPath: /etc/robotics-playground
              readOnly: true
          readinessProbe:
            httpGet:
              path: /api/health
              port: http
            initialDelaySeconds: 3
            timeoutSeconds: 5
            periodSeconds: 10
            failureThreshold: 6
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              memory: 2Gi
        - name: zenoh-bridge
          image: eclipse/zenoh-bridge-ros2dds:1.9.0
          args: ["-c", "/etc/zenoh/config.json5"]
          securityContext:
            runAsNonRoot: true
            allowPrivilegeEscalation: false
          volumeMounts:
            - name: zenoh-config
              mountPath: /etc/zenoh
              readOnly: true
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              memory: 256Mi
      volumes:
        - name: config
          configMap:
            name: robotics-playground-config
        - name: zenoh-config
          configMap:
            name: zenoh-backend-config
