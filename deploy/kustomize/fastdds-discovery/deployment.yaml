apiVersion: apps/v1
kind: Deployment
metadata:
  name: fastdds-discovery
  labels:
    app.kubernetes.io/name: fastdds-discovery
    app.kubernetes.io/component: discovery
    app.kubernetes.io/part-of: robotics-playground
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: fastdds-discovery
  template:
    metadata:
      labels:
        app.kubernetes.io/name: fastdds-discovery
        app.kubernetes.io/component: discovery
        app.kubernetes.io/part-of: robotics-playground
    spec:
      containers:
        - name: discovery-server
          image: eprosima/discovery-server:v2
          ports:
            - name: discovery
              containerPort: 11811
              protocol: UDP
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              memory: 128Mi
