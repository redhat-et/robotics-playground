apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

resources:
  - ui-deployment.yaml
  - ui-service.yaml
  - backend-deployment.yaml
  - backend-service.yaml
  - configmap.yaml
  - isaac-lab/

configMapGenerator:
  - name: zenoh-backend-config
    files:
      - config.json5=zenoh-backend-config.json5
    options:
      disableNameSuffixHash: true
