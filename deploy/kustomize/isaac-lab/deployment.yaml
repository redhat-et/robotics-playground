apiVersion: apps/v1
kind: Deployment
metadata:
  name: isaac-lab
  labels:
    app.kubernetes.io/name: isaac-lab
    app.kubernetes.io/component: simulator
    app.kubernetes.io/part-of: robotics-playground
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: isaac-lab
  template:
    metadata:
      labels:
        app.kubernetes.io/name: isaac-lab
        app.kubernetes.io/component: simulator
        app.kubernetes.io/part-of: robotics-playground
    spec:
      containers:
        - name: isaac-lab
          image: nvcr.io/nvidia/isaac-lab:2.3.2
          command: ["bash", "-c"]
          args:
            - ./isaaclab.sh -p /app/launch_ros2_scene.py --headless --enable_cameras
          env:
            - name: LD_LIBRARY_PATH
              value: /isaac-sim/exts/isaacsim.ros2.bridge/jazzy/lib
            - name: PYTHONPATH
              value: /isaac-sim/exts/isaacsim.ros2.bridge/jazzy/rclpy:/isaac-sim/exts/isaacsim.ros2.bridge/jazzy/lib/python3.10/site-packages
            - name: ROS_DISCOVERY_SERVER
              value: fastdds-discovery:11811
          volumeMounts:
            - name: launch-script
              mountPath: /app
              readOnly: true
            - name: kit-cache
              mountPath: /isaac-sim/kit/cache
          resources:
            requests:
              cpu: "4"
              memory: 16Gi
            limits:
              nvidia.com/gpu: "1"
              memory: 32Gi
      volumes:
        - name: launch-script
          configMap:
            name: isaac-lab-launch-script
        - name: kit-cache
          emptyDir: {}
