apiVersion: v1
kind: ConfigMap
metadata:
  name: robotics-playground-nginx
  labels:
    app.kubernetes.io/name: robotics-playground-ui
    app.kubernetes.io/component: frontend
    app.kubernetes.io/part-of: robotics-playground
data:
  nginx.conf: |
    worker_processes auto;
    error_log /dev/stderr warn;
    pid /tmp/nginx.pid;

    events {
        worker_connections 1024;
    }

    http {
        include /etc/nginx/mime.types;
        default_type application/octet-stream;
        access_log /dev/stdout;
        types_hash_max_size 4096;

        server {
            listen 8080;
            root /opt/app-root/src;
            index index.html;

            location /api/ {
                proxy_pass http://robotics-playground:8000;
                proxy_set_header Host $host;
                proxy_set_header X-Real-IP $remote_addr;
            }

            location /ws {
                proxy_pass http://robotics-playground:8000;
                proxy_http_version 1.1;
                proxy_set_header Upgrade $http_upgrade;
                proxy_set_header Connection "upgrade";
                proxy_set_header Host $host;
            }

            location /rerun/ {
                try_files $uri $uri/ $uri.js =404;
                add_header Cache-Control "no-cache";
                gzip on;
                gzip_types application/javascript application/wasm;
            }

            location / {
                try_files $uri $uri/ /index.html;
            }
        }
    }
