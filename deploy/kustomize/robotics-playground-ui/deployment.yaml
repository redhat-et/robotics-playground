apiVersion: apps/v1
kind: Deployment
metadata:
  name: robotics-playground-ui
  labels:
    app.kubernetes.io/name: robotics-playground-ui
    app.kubernetes.io/component: frontend
    app.kubernetes.io/part-of: robotics-playground
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: robotics-playground-ui
  template:
    metadata:
      labels:
        app.kubernetes.io/name: robotics-playground-ui
        app.kubernetes.io/component: frontend
        app.kubernetes.io/part-of: robotics-playground
    spec:
      containers:
        - name: nginx
          image: quay.io/redhat-et/robotics-playground-ui:latest
          volumeMounts:
            - name: nginx-config
              mountPath: /etc/nginx/nginx.conf
              subPath: nginx.conf
              readOnly: true
          ports:
            - name: http-mf
              containerPort: 8080
              protocol: TCP
          readinessProbe:
            httpGet:
              path: /remoteEntry.js
              port: http-mf
            initialDelaySeconds: 2
            periodSeconds: 10
          resources:
            requests:
              cpu: 10m
              memory: 32Mi
            limits:
              memory: 64Mi
      volumes:
        - name: nginx-config
          configMap:
            name: robotics-playground-nginx
